---
apiVersion: v1
kind: policy
spec:
  name: CIS - world writable files do not exist (comprehensive)
  platforms: Linux
  platform: linux
  description: |
    No regular file should be world-writable. A file is world-writable when the last
    octal digit of its mode has the 0002 bit set (digits 2, 3, 6, or 7). This policy
    recursively scans high-risk directory trees (/etc, /usr/local/{bin,sbin},
    /var/log, /var/lib, /opt, /root, /home, /usr/share, /var/www) using osquery's
    file table. Osquery is not well suited to scanning the entire filesystem; for a
    full check run the `find` command in the resolution.
  resolution: |
    Find all world-writable files and remove the offending bit:
    # find / -xdev -type f -perm -0002 -exec ls -l {} +
    # find / -xdev -type f -perm -0002 -exec chmod o-w {} +
  query: |
    SELECT 1 WHERE NOT EXISTS (
      SELECT 1 FROM file
      WHERE path LIKE '/etc/%%'
      AND type = 'regular'
      AND SUBSTR(mode, 4, 1) IN ('2', '3', '6', '7')
    ) AND NOT EXISTS (
      SELECT 1 FROM file
      WHERE path LIKE '/usr/local/bin/%%'
      AND type = 'regular'
      AND SUBSTR(mode, 4, 1) IN ('2', '3', '6', '7')
    ) AND NOT EXISTS (
      SELECT 1 FROM file
      WHERE path LIKE '/usr/local/sbin/%%'
      AND type = 'regular'
      AND SUBSTR(mode, 4, 1) IN ('2', '3', '6', '7')
    ) AND NOT EXISTS (
      SELECT 1 FROM file
      WHERE path LIKE '/var/log/%%'
      AND type = 'regular'
      AND SUBSTR(mode, 4, 1) IN ('2', '3', '6', '7')
    ) AND NOT EXISTS (
      SELECT 1 FROM file
      WHERE path LIKE '/var/lib/%%'
      AND type = 'regular'
      AND SUBSTR(mode, 4, 1) IN ('2', '3', '6', '7')
    ) AND NOT EXISTS (
      SELECT 1 FROM file
      WHERE path LIKE '/opt/%%'
      AND type = 'regular'
      AND SUBSTR(mode, 4, 1) IN ('2', '3', '6', '7')
    ) AND NOT EXISTS (
      SELECT 1 FROM file
      WHERE path LIKE '/root/%%'
      AND type = 'regular'
      AND SUBSTR(mode, 4, 1) IN ('2', '3', '6', '7')
    ) AND NOT EXISTS (
      SELECT 1 FROM file
      WHERE path LIKE '/home/%%'
      AND type = 'regular'
      AND SUBSTR(mode, 4, 1) IN ('2', '3', '6', '7')
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level1, CIS-ubuntu-24.04-7.1.9
  contributors: allenhouchins

---
apiVersion: v1
kind: policy
spec:
  name: CIS - no unowned files or directories exist
  platforms: Linux
  platform: linux
  description: |
    Sometimes when administrators delete users from the passwd file they neglect to remove all files owned by those users from the system.
  resolution: |
    Locate files that are owned by users or groups not listed in the system configuration files, and reset the ownership of these files to some active user on the system.
  query: |
    SELECT 1 WHERE NOT EXISTS (
      SELECT 1 FROM file f 
      LEFT JOIN users u ON f.uid = u.uid 
      WHERE u.uid IS NULL 
        AND f.directory IN (
          '/etc', '/bin', '/sbin', '/usr/bin', '/usr/sbin', 
          '/usr/local/bin', '/usr/local/sbin', '/var/log', 
          '/var/lib', '/opt', '/root'
        )
    ) AND NOT EXISTS (
      SELECT 1 FROM file f 
      LEFT JOIN users u ON f.uid = u.uid 
      WHERE u.uid IS NULL 
        AND f.directory LIKE '/home/%'
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level1, CIS-ubuntu-24.04-7.1.10
  contributors: allenhouchins

---
apiVersion: v1
kind: policy
spec:
  name: CIS - no ungrouped files or directories exist (optimized)
  platforms: Linux
  platform: linux
  description: |
    Sometimes when administrators delete groups from the /etc/group file they neglect to remove all files owned by those groups from the system.
  resolution: |
    Locate files that are owned by groups not listed in the system configuration files, and reset the ownership of these files to an active group.
  query: |
    SELECT 1 WHERE NOT EXISTS (
      SELECT 1 FROM file f 
      LEFT JOIN groups g ON f.gid = g.gid 
      WHERE g.gid IS NULL 
        AND f.directory IN (
          '/etc', '/bin', '/sbin', '/usr/bin', '/usr/sbin', 
          '/usr/local/bin', '/usr/local/sbin', '/var/log', 
          '/var/lib', '/opt', '/root'
        )
    ) AND NOT EXISTS (
      SELECT 1 FROM file f 
      LEFT JOIN groups g ON f.gid = g.gid 
      WHERE g.gid IS NULL 
        AND f.directory LIKE '/home/%'
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level1, CIS-ubuntu-24.04-7.1.11
  contributors: allenhouchins

