apiVersion: v1
kind: policy
spec:
  name: CIS - permissions on /etc/passwd are configured
  platforms: Linux
  platform: linux
  description: |
    The /etc/passwd file contains user account information that is used by many system utilities.
  resolution: |
    Run the following commands:
