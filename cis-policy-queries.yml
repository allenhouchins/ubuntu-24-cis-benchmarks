---
apiVersion: v1
kind: policy
spec:
  name: CIS - auditing for processes that start prior to auditd is enabled
  platforms: Linux
  platform: linux
  description: |
    Configure grub so that processes that are capable of being audited can be audited even if they start up prior to auditd startup.
  resolution: |
    Edit /etc/default/grub and add the following parameter to GRUB_CMDLINE_LINUX:
    audit=1
    Run: update-grub
    Reboot
  query: |
    SELECT 1 WHERE EXISTS (
      SELECT * FROM kernel_info 
      WHERE arguments LIKE '%audit=1%'
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level2, CIS-ubuntu-24.04-6.1.1.3
  contributors: allenhouchins

---
apiVersion: v1
kind: policy
spec:
  name: CIS - audit_backlog_limit is sufficient
  platforms: Linux
  platform: linux
  description: |
    The backlog limit has a default setting of 64. This may not be sufficient for all environments.
  resolution: |
    Edit /etc/default/grub and add the following parameter to GRUB_CMDLINE_LINUX:
    audit_backlog_limit=8192
    Run: update-grub
    Reboot
  query: |
    -- Check for audit_backlog_limit parameter set to a value greater than 64
    -- More efficient pattern matching approach
    SELECT 1 WHERE EXISTS (
      SELECT * FROM kernel_info 
      WHERE arguments LIKE '%audit_backlog_limit=%'
      AND (
        -- Three or more digits (100+)
        arguments LIKE '%audit_backlog_limit=___% %' OR
        arguments LIKE '%audit_backlog_limit=____%' OR
        -- Two digits starting with 7, 8, or 9 (70-99)
        arguments LIKE '%audit_backlog_limit=7_ %' OR arguments LIKE '%audit_backlog_limit=7_' OR
        arguments LIKE '%audit_backlog_limit=8_ %' OR arguments LIKE '%audit_backlog_limit=8_' OR
        arguments LIKE '%audit_backlog_limit=9_ %' OR arguments LIKE '%audit_backlog_limit=9_' OR
        -- Specific values 65-69
        arguments LIKE '%audit_backlog_limit=65 %' OR arguments LIKE '%audit_backlog_limit=65' OR
        arguments LIKE '%audit_backlog_limit=66 %' OR arguments LIKE '%audit_backlog_limit=66' OR
        arguments LIKE '%audit_backlog_limit=67 %' OR arguments LIKE '%audit_backlog_limit=67' OR
        arguments LIKE '%audit_backlog_limit=68 %' OR arguments LIKE '%audit_backlog_limit=68' OR
        arguments LIKE '%audit_backlog_limit=69 %' OR arguments LIKE '%audit_backlog_limit=69'
      )
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level2, CIS-ubuntu-24.04-6.1.1.4
  contributors: allenhouchins

---
apiVersion: v1
kind: policy
spec:
  name: CIS - audit log storage size is configured
  platforms: Linux
  platform: linux
  description: |
    Configure the maximum size of the audit log file.
  resolution: |
    Set the following parameter in /etc/audit/auditd.conf:
    max_log_file = 100
  query: |
    SELECT 1 WHERE EXISTS (
      SELECT * FROM augeas 
      WHERE path = '/etc/audit/auditd.conf'
      AND label = 'max_log_file'
      AND CAST(value AS INTEGER) >= 100
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level2, CIS-ubuntu-24.04-6.1.2.1
  contributors: allenhouchins

---
apiVersion: v1
kind: policy
spec:
  name: CIS - audit logs are not automatically deleted
  platforms: Linux
  platform: linux
  description: |
    The max_log_file_action setting determines how to handle the audit log file reaching the max file size.
  resolution: |
    Set the following parameter in /etc/audit/auditd.conf:
    max_log_file_action = keep_logs
  query: |
    SELECT 1 WHERE EXISTS (
      SELECT * FROM augeas 
      WHERE path = '/etc/audit/auditd.conf' 
      AND label = 'max_log_file_action'
      AND value = 'keep_logs'
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level2, CIS-ubuntu-24.04-6.1.2.2
  contributors: allenhouchins

---
apiVersion: v1
kind: policy
spec:
  name: CIS - system is disabled when audit logs are full
  platforms: Linux
  platform: linux
  description: |
    The auditd daemon can be configured to halt the system when the audit logs are full.
  resolution: |
    Set the following parameters in /etc/audit/auditd.conf:
    space_left_action = email
    action_mail_acct = root
    admin_space_left_action = halt
  query: |
    SELECT 1 WHERE EXISTS (
      SELECT * FROM augeas 
      WHERE path = '/etc/audit/auditd.conf' 
      AND label = 'space_left_action'
      AND value = 'email'
    ) AND EXISTS (
      SELECT * FROM augeas 
      WHERE path = '/etc/audit/auditd.conf' 
      AND label = 'action_mail_acct'
      AND value = 'root'
    ) AND EXISTS (
      SELECT * FROM augeas 
      WHERE path = '/etc/audit/auditd.conf' 
      AND label = 'admin_space_left_action'
      AND value = 'halt'
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level2, CIS-ubuntu-24.04-6.1.2.3
  contributors: allenhouchins

---
apiVersion: v1
kind: policy
spec:
  name: CIS - all logfiles have appropriate permissions and ownership
  platforms: Linux
  platform: linux
  description: |
    System log files stored under /var/log/ should be owned by root and have group-write,
    group-execute, and all 'other' permission bits cleared (mode 0640 or stricter for files,
    0750 or stricter for directories). This check recursively inspects every regular file
    under /var/log/ and fails the host if any file is owned by a non-root user, has any
    'other' permission bit set, or has group-write/group-execute set.
  resolution: |
    Run the following commands as root to remediate permissions and ownership under /var/log/:
    # find /var/log -type f -exec chmod g-wx,o-rwx {} +
    # find /var/log -type d -exec chmod g-w,o-rwx {} +
    # find /var/log -type f ! -group adm ! -group syslog -exec chown root:root {} +
    Some distributions ship specific files (e.g. /var/log/lastlog, /var/log/wtmp) with
    different group ownership; review and adjust per the CIS guidance for your environment.
  query: |
    SELECT 1 WHERE NOT EXISTS (
      SELECT 1 FROM file
      WHERE path LIKE '/var/log/%%'
      AND type = 'regular'
      AND (
        uid != 0
        OR SUBSTR(mode, 3, 1) NOT IN ('0', '4')
        OR SUBSTR(mode, 4, 1) != '0'
      )
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level1, CIS-ubuntu-24.04-6.1.3
  contributors: allenhouchins

# =============================================================================
# SECTION 4: LOGGING AND AUDITING - CONFIGURE AUDIT RULES
# =============================================================================

---
apiVersion: v1
kind: policy
spec:
  name: CIS - audit rule for apparmor parser is configured
  platforms: Linux
  platform: linux
  description: |
    A watch rule on /usr/sbin/apparmor_parser must be configured so that any execution of
    the AppArmor profile parser is recorded by auditd. This policy passes when a rule of
    the form -w /usr/sbin/apparmor_parser -p x -k <key> is present in a rules.d file.
  resolution: |
    Create or edit /etc/audit/rules.d/50-MAC-policy.rules and ensure it contains:
    -w /usr/sbin/apparmor_parser -p x -k MAC-policy
    Then reload the rules and verify:
    # augenrules --load
    # auditctl -l | grep apparmor_parser
  query: |
    SELECT 1 WHERE EXISTS (
      SELECT 1 FROM file_lines
      WHERE path LIKE '/etc/audit/rules.d/%.rules'
      AND line LIKE '-w /usr/sbin/apparmor_parser %-p x%-k %'
    );
  purpose: Informational
  tags: compliance, CIS, CIS_Level2, CIS-ubuntu-24.04-6.2.2.1
  contributors: allenhouchins

---
apiVersion: v1
kind: policy
spec:
  name: CIS - changes to system administration scope (sudoers) is collected
  platforms: Linux
  platform: linux
  description: |
    Audit rules must collect every write or attribute change to /etc/sudoers and the
    /etc/sudoers.d directory. This policy passes only when both watch rules
    (-w /etc/sudoers -p wa -k scope and -w /etc/sudoers.d -p wa -k scope) are present in
    a rules.d file or the compiled audit.rules file.
  resolution: |
    Create or edit /etc/audit/rules.d/50-scope.rules and ensure it contains:
    -w /etc/sudoers -p wa -k scope
    -w /etc/sudoers.d -p wa -k scope
    Then reload the audit rules and verify with auditctl:
    # augenrules --load
    # auditctl -l | grep scope
  query: |
    SELECT 1 WHERE
    EXISTS (
      SELECT 1 FROM file_lines
      WHERE path LIKE '/etc/audit/rules.d/%.rules'
      AND line LIKE '-w /etc/sudoers %-p wa%-k %'
    )
    AND EXISTS (
      SELECT 1 FROM file_lines
