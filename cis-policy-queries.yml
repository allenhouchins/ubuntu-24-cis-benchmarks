      SELECT 1 FROM file_lines
      WHERE path LIKE '/etc/audit/rules.d/%.rules'
      AND line LIKE '-w /var/run/utmp %-p wa%-k session%'
    )
    AND EXISTS (
      SELECT 1 FROM file_lines
      WHERE path LIKE '/etc/audit/rules.d/%.rules'
      AND line LIKE '-w /var/log/wtmp %-p wa%-k logins%'
